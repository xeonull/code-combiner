<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Code Combiner</title>
    <style>
      :root {
        --bg-color: #1e1e1e;
        --sidebar-bg: #252526;
        --editor-bg: #1e1e1e;
        --text-main: #cccccc;
        --text-muted: #858585;
        --accent: #4caf50;
        --accent-hover: #66bb6a;
        --border: #3e3e42;
        --btn-text: #ffffff;
        --folder-accent: #9e9e9e;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background-color: var(--bg-color);
        color: var(--text-main);
        display: flex;
        height: 100vh;
        overflow: hidden;
      }

      /* --- Sidebar (Левая панель) --- */
      .sidebar {
        width: 420px; /* Базовая ширина */
        flex-shrink: 0;
        background-color: var(--sidebar-bg);
        display: flex;
        flex-direction: column;
        padding: 15px;
        min-width: 240px;
      }

      /* --- Resizer (Разделитель для изменения ширины) --- */
      .resizer {
        width: 5px;
        background-color: var(--border);
        cursor: col-resize;
        flex-shrink: 0;
        z-index: 10;
        transition: background-color 0.2s;
      }

      .resizer:hover,
      .resizer.active {
        background-color: var(--accent);
      }

      .header h1 {
        font-size: 1.2rem;
        color: var(--accent);
        margin-bottom: 15px;
      }

      .file-input-wrapper {
        position: relative;
        overflow: hidden;
        display: inline-block;
        width: 100%;
        margin-bottom: 15px;
      }

      .btn {
        display: inline-block;
        padding: 8px 16px;
        background-color: var(--accent);
        color: var(--btn-text);
        border: none;
        border-radius: 4px;
        font-weight: 600;
        cursor: pointer;
        text-align: center;
        transition: background-color 0.2s;
        font-size: 0.9rem;
        min-width: 200px;
      }
      .btn:hover {
        background-color: var(--accent-hover);
      }

      .file-input-wrapper input[type='file'] {
        font-size: 100px;
        position: absolute;
        left: 0;
        top: 0;
        opacity: 0;
        cursor: pointer;
      }

      .select-actions {
        display: flex;
        gap: 10px;
        margin-bottom: 14px;
      }
      .btn-small {
        flex: 1;
        padding: 6px;
        font-size: 0.8rem;
        background: transparent;
        color: var(--text-main);
        border: 1px solid var(--border);
        border-radius: 4px;
        cursor: pointer;
      }
      .btn-small:hover {
        background: var(--border);
      }

      /* --- Дерево файлов --- */
      .tree-container {
        flex-grow: 1;
        overflow-y: auto;
        overflow-x: hidden;
        border: 1px solid var(--border);
        border-radius: 4px;
        padding: 10px;
        background: var(--bg-color);
      }

      details {
        margin-left: 12px;
        min-width: 0;
      }

      summary {
        cursor: pointer;
        padding: 4px 0;
        color: var(--text-main);
        font-weight: 600;
        list-style: none;
        display: flex;
        align-items: center;
        gap: 6px;
        min-width: 0; /* Обязательно для Flexbox-обрезания текста */
      }
      summary::-webkit-details-marker {
        display: none;
      }

      .folder-icon::before {
        content: '📁';
        font-size: 0.9rem;
        flex-shrink: 0;
      }
      details[open] > summary .folder-icon::before {
        content: '📂';
      }

      .file-item {
        margin-left: 20px;
        padding: 4px 0;
        color: var(--text-muted);
        min-width: 0; /* Обязательно для Flexbox-обрезания */
      }

      /* Flex-контейнер для строки файла */
      .tree-label {
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 6px;
        min-width: 0;
        width: 100%;
      }

      /* Динамическая обрезка текста */
      .truncate-text {
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        flex: 1;
        min-width: 0;
        display: block;
      }

      .file-checkbox {
        accent-color: var(--accent);
        cursor: pointer;
        flex-shrink: 0;
      }
      .folder-checkbox {
        accent-color: var(--folder-accent);
        cursor: pointer;
        flex-shrink: 0;
      }

      /* Специфично для иконки файла, чтобы не сжималась */
      .file-icon {
        flex-shrink: 0;
      }

      /* --- Главная панель (Правая часть) --- */
      .main-content {
        flex-grow: 1;
        display: flex;
        flex-direction: column;
        padding: 15px;
        background-color: var(--bg-color);
        min-width: 0; /* Чтобы правая панель не распирала контейнер */
      }

      .activity-bar {
        display: flex;
        flex-wrap: wrap;
        justify-content: space-between;
        align-items: flex-end;
        margin-bottom: 15px;
        gap: 15px;
        background: var(--sidebar-bg);
        padding: 12px;
        border-radius: 6px;
        border: 1px solid var(--border);
      }

      .toolbar {
        display: flex;
        flex-wrap: wrap;
        justify-content: space-between;
        align-items: flex-end;
        margin-bottom: 12px;
        gap: 15px;
        background: var(--sidebar-bg);
        padding: 15px;
        border-radius: 6px;
        border: 1px solid var(--border);
      }

      .options-group {
        display: flex;
        flex-wrap: wrap;
        gap: 45px;
        align-items: center;
      }

      .option-label {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 0.85rem;
        cursor: pointer;
        color: var(--text-main);
      }
      .option-label input {
        accent-color: var(--accent);
      }

      .actions-group {
        display: flex;
        gap: 10px;
      }

      /* Контейнер редактора */
      .editor-container {
        display: flex;
        flex-grow: 1;
        border: 1px solid var(--border);
        border-radius: 6px;
        background-color: var(--editor-bg);
        overflow: hidden;
      }

      .line-numbers {
        padding: 15px 10px;
        background-color: var(--sidebar-bg);
        color: var(--text-muted);
        text-align: right;
        user-select: none;
        overflow-y: hidden;
        font-family: 'Courier New', Courier, monospace;
        font-size: 14px;
        line-height: 1.5;
        border-right: 1px solid var(--border);
        min-width: 45px;
      }

      textarea {
        flex-grow: 1;
        width: 100%;
        background-color: transparent;
        color: var(--text-main);
        border: none;
        padding: 15px;
        font-family: 'Courier New', Courier, monospace;
        font-size: 14px;
        resize: none;
        outline: none;
        line-height: 1.5;
        white-space: pre;
        overflow: auto;
      }

      ::-webkit-scrollbar {
        width: 10px;
        height: 10px;
      }
      ::-webkit-scrollbar-track {
        background: var(--bg-color);
      }
      ::-webkit-scrollbar-thumb {
        background: var(--border);
        border-radius: 5px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: var(--text-muted);
      }
    </style>
  </head>
  <body>
    <div class="sidebar" id="sidebar">
      <div class="header">
        <h1>🧩 Code Combiner</h1>
        <div class="file-input-wrapper">
          <button class="btn" style="width: 100%">📁 Select Folder</button>
          <input type="file" id="folderInput" webkitdirectory directory multiple />
        </div>
      </div>

      <div class="select-actions">
        <button class="btn-small" onclick="toggleAllFiles(true)">Select All</button>
        <button class="btn-small" onclick="toggleAllFiles(false)">Deselect All</button>
      </div>

      <div class="tree-container" id="treeContainer">
        <div style="color: var(--text-muted); text-align: center; padding-top: 20px; font-size: 0.9rem">Select a folder to view files</div>
      </div>
    </div>

    <div class="resizer" id="resizer"></div>

    <div class="main-content">
      <div class="toolbar">
        <div class="options-group">
          <label class="option-label"> <input type="checkbox" id="optIncludePath" checked /> Include Path </label>
          <label class="option-label"> <input type="checkbox" id="optRemoveComments" /> Remove Comments </label>
          <label class="option-label"> <input type="checkbox" id="optMinify" /> Minify </label>
          <label class="option-label"> <input type="checkbox" id="optAddSeparator" /> Add Separator </label>
        </div>
      </div>
      <div class="activity-bar">
        <div class="actions-group">
          <button class="btn" id="combineBtn">🚀 Combine</button>
          <button class="btn" id="copyBtn" style="background-color: var(--border)">📋 Copy</button>
        </div>
      </div>

      <div class="editor-container">
        <div class="line-numbers" id="lineNumbers">1</div>
        <textarea id="outputArea" readonly placeholder="Your combined code will appear here..."></textarea>
      </div>
    </div>

    <script>
      // --- Элементы UI ---
      const folderInput = document.getElementById('folderInput');
      const treeContainer = document.getElementById('treeContainer');
      const combineBtn = document.getElementById('combineBtn');
      const outputArea = document.getElementById('outputArea');
      const copyBtn = document.getElementById('copyBtn');
      const lineNumbersDiv = document.getElementById('lineNumbers');

      // --- Элементы ресайзера ---
      const resizer = document.getElementById('resizer');
      const sidebar = document.getElementById('sidebar');

      let fileStorage = [];

      // --- Логика изменения размера (Resizer) ---
      let isResizing = false;

      resizer.addEventListener('mousedown', (e) => {
        isResizing = true;
        resizer.classList.add('active');
        document.body.style.cursor = 'col-resize';
        // Отключаем выделение текста при перетаскивании
        document.body.style.userSelect = 'none';
      });

      document.addEventListener('mousemove', (e) => {
        if (!isResizing) return;
        // Ограничиваем минимальную и максимальную ширину левой панели
        let newWidth = e.clientX;
        if (newWidth > document.body.clientWidth - 400) newWidth = document.body.clientWidth - 400; // Оставляем место для правой панели

        sidebar.style.width = `${newWidth}px`;
      });

      document.addEventListener('mouseup', () => {
        if (isResizing) {
          isResizing = false;
          resizer.classList.remove('active');
          document.body.style.cursor = 'default';
          document.body.style.userSelect = 'auto';
        }
      });

      // --- Логика Файлов ---
      folderInput.addEventListener('change', (e) => {
        const files = Array.from(e.target.files);
        if (files.length === 0) return;

        fileStorage = files;
        const fileTree = buildTree(files);
        treeContainer.innerHTML = '';
        treeContainer.appendChild(renderTree(fileTree, true));
      });

      function buildTree(files) {
        const root = {};
        files.forEach((file, index) => {
          const parts = file.webkitRelativePath.split('/');
          let currentLevel = root;
          for (let i = 0; i < parts.length - 1; i++) {
            const part = parts[i];
            if (!currentLevel[part]) {
              currentLevel[part] = {};
            }
            currentLevel = currentLevel[part];
          }
          currentLevel[parts[parts.length - 1]] = { isFile: true, index: index, name: file.name };
        });
        return root;
      }

      function renderTree(node, isRoot = false) {
        const container = document.createElement('div');

        for (const key in node) {
          if (node[key].isFile) {
            const fileItem = document.createElement('div');
            fileItem.className = 'file-item';
            fileItem.innerHTML = `
                        <label class="tree-label" title="${node[key].name}">
                            <input type="checkbox" class="file-checkbox" value="${node[key].index}" checked>
                            <span class="file-icon">📄</span>
                            <span class="truncate-text">${node[key].name}</span>
                        </label>
                    `;
            container.appendChild(fileItem);
          } else {
            const details = document.createElement('details');
            details.open = isRoot;

            const summary = document.createElement('summary');
            summary.innerHTML = `
                        <input type="checkbox" class="folder-checkbox" checked title="Select/Deselect all files in folder">
                        <span class="folder-icon"></span>
                        <span class="truncate-text" title="${key}">${key}</span>
                    `;

            details.appendChild(summary);
            details.appendChild(renderTree(node[key]));
            container.appendChild(details);
          }
        }
        return container;
      }

      treeContainer.addEventListener('change', (e) => {
        if (e.target.classList.contains('folder-checkbox')) {
          const details = e.target.closest('details');
          if (details) {
            const checkboxes = details.querySelectorAll('input[type="checkbox"]');
            checkboxes.forEach((cb) => (cb.checked = e.target.checked));
          }
        }
      });

      function toggleAllFiles(state) {
        const checkboxes = document.querySelectorAll('#treeContainer input[type="checkbox"]');
        checkboxes.forEach((cb) => (cb.checked = state));
      }

      combineBtn.addEventListener('click', async () => {
        const checkboxes = document.querySelectorAll('.file-checkbox:checked');
        if (checkboxes.length === 0) {
          alert('Please select at least one file!');
          return;
        }

        combineBtn.textContent = '⏳ Processing...';
        combineBtn.style.opacity = '0.7';

        const optIncludePath = document.getElementById('optIncludePath').checked;
        const optRemoveComments = document.getElementById('optRemoveComments').checked;
        const optMinify = document.getElementById('optMinify').checked;
        const optAddSeparator = document.getElementById('optAddSeparator').checked;

        let combinedText = '';

        for (const cb of checkboxes) {
          const file = fileStorage[cb.value];
          let text = await file.text();

          if (optRemoveComments) {
            text = text.replace(/\/\*[\s\S]*?\*\//g, '');
            text = text.replace(/\/\/.*$/gm, '');
          }

          if (optMinify) {
            text = text
              .split('\n')
              .map((line) => line.trim())
              .filter((line) => line.length > 0)
              .join('\n');
          }

          if (optIncludePath) {
            combinedText += `// ${file.webkitRelativePath}:\n`;
          }

          combinedText += text + '\n';

          if (optAddSeparator) {
            combinedText += `\n/* ----------------------------------------- */\n\n`;
          }
        }

        outputArea.value = combinedText;
        updateLineNumbers();

        combineBtn.textContent = '🚀 Combine';
        combineBtn.style.opacity = '1';
      });

      copyBtn.addEventListener('click', () => {
        if (!outputArea.value) {
          alert('Nothing to copy!');
          return;
        }

        navigator.clipboard.writeText(outputArea.value).then(() => {
          const originalText = copyBtn.textContent;
          copyBtn.textContent = '✅ Copied';
          copyBtn.style.backgroundColor = 'var(--accent)';
          setTimeout(() => {
            copyBtn.textContent = originalText;
            copyBtn.style.backgroundColor = 'var(--border)';
          }, 2000);
        });
      });

      function updateLineNumbers() {
        const linesCount = outputArea.value.split('\n').length;
        let numbersHtml = '';
        for (let i = 1; i <= linesCount; i++) {
          numbersHtml += `<div>${i}</div>`;
        }
        lineNumbersDiv.innerHTML = numbersHtml || '<div>1</div>';
      }

      outputArea.addEventListener('input', updateLineNumbers);

      outputArea.addEventListener('scroll', () => {
        lineNumbersDiv.scrollTop = outputArea.scrollTop;
      });
    </script>
  </body>
</html>
